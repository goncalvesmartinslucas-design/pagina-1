<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Pênalti</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Mini Jogo de Pênalti</h1>
    <p>Escolha um canto para chutar e tente enganar o goleiro!</p>

    <div id="campo">
        <div id="trave"></div>
        <div id="goleiro"></div>
        <div id="bola"></div>
    </div>

    <div class="botoes">
        <button onclick="chutar('esquerda')">Chutar na Esquerda</button>
        <button onclick="chutar('centro')">Chutar no Centro</button>
        <button onclick="chutar('direita')">Chutar na Direita</button>
    </div>

    <div id="placar">Gols: <span id="gols">0</span> | Defesas: <span id="defesas">0</span></div>
    <p id="mensagem"></p>

    <script src="script.js"></script>
</body>
</html>
